<!-- Create wheather a number is positive,negative or zero. -->
<!DOCTYPE html>
<html lang="en">
<head>
  
  <title>Document</title>
</head>
<script>
let number = Number(prompt("Enter a number : "));
 
if (number > 0){
  console.log('Positive Number');
}
else if(number < 0){
  console.log('Negative Number');
}
else{
   console.log('Zero');
}
</script>

</body>
</html>
