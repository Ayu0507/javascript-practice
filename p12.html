<!-- Check wheather a number is odd or even -->

<!DOCTYPE html>
<html lang="en">
<head>
 
  <title>Document</title>
</head>
<script>
  let number = Number(prompt("Enter a number"));
  if (number % 2 == 0)
  console.log(`${number} is even`);
else
console.log(`${number} is odd`)
</script>

</body>
</html>
