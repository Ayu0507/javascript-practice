<!-- Check wheather a year is leap year. -->

<!DOCTYPE html>
<html lang="en">
<head>
  
  <title>Document</title>
</head>
<script>
  let year = Number(prompt('Enter year : '));
  if (year % 4 === 0 )
  console.log(`${year} is leap year.`)
else
console.log(`${year} is not leap year.`)
</script>
<body>
  
</body>
</html>
