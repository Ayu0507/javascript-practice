<!-- Create a simple grade calculator using maarks. -->

<!DOCTYPE html>
<html lang="en">
<head>
  
  <title>Document</title>
</head>
<script>
  let marks = Number(prompt('Enter marks :'));

  if (marks >= 90)
    console.log("Grade 'A'")
  else if (marks >= 75)
    console.log("Grade 'B'")
  else if (marks >= 50)
    console.log("Grade 'C'")
  else if (marks >= 35)
    console.log("Grde 'D'")
  else 
    console.log("Grade 'F'")
</script>

</body>
</html>
