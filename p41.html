<!-- Create a simple calculator that performs addition, subtraction, multiplication an division. -->

<!DOCTYPE html>
<html lang="en">
<head>
  
  <title>Document</title>
</head>
<script>
 let a = Number(prompt("Enter a number : "));
 let operand = prompt('Enter operator (+,-,*,/)');
 let b = Number(prompt("Enter a number: "));
 if (operand === '+')
 alert(`Sum of two numbers is : ${a+b}`);
else if (operand === '-')
alert(`Difference of two numbers is : ${a-b}`);
else if (operand === '*')
alert(`Product of two numbers is : ${a*b}`);
else if (operand === '/')
alert(`Division of two numbers is : ${a/b}`);
else
alert('Invalid operator!')

</script>

</body>
</html>
