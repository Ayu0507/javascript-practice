<!-- Calculate the total bill after applying a discount. -->

<!DOCTYPE html>
<html lang="en">
<head>
  
  <title>Document</title>
</head>
<script>
  let basketball = 45;
  let football = 56;
  let Tshirt = 34;
  let total = basketball + football + Tshirt;
  let discount = total*5/100;
  console.log(`Total amount is $${total}`);
  console.log(`discount: $${discount}`)
  console.log(`Total bill after applying discount : $${total-discount}`)
</script>

</html>
