<!DOCTYPE html>
<html lang="en">

  <title>Document</title>
</head>
<script>
  let previousReading = 2450
  let currentReading = 2675
  if (currentReading < previousReading)
   alert('Invalid meter reading')
  let units = currentReading - previousReading 
  console.log('Units : ' , units , 'units')
 let energyCharge = '';
  if(units <= 100)
   energyCharge = units*3;
  else if(units > 100 && units <= 200)
   energyCharge = 100 * 3 + (units - 100) * 5
  else
  energyCharge = 100 * 3 +  100 * 5 + (units - 200) * 7
  
  let fixedCharge = 100;
  let otherCharge =  50;
  let totalBill = energyCharge + otherCharge + fixedCharge;
  console.log("Total Bill : ", totalBill);
</script>
