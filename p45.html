<!-- Calculate movie ticket price based on there age. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <title>Document</title>
</head>
<script>
let age = prompt('Enter your age : ');
if (age <= 0)
 alert('Invalid age!')
else if(age <= 5)
 alert('Price of movie ticket : $10')
else if(age <= 15)
 alert('Price of movie ticket : $15')
else if(age <= 20)
 alert('Price of movie ticket : $20')
else
alert('Price of movie ticket : $50')

</script>

</body>
</html>
