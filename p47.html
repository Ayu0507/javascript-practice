<!-- Rock,paper,scissors winner check.-->

<!DOCTYPE html>
<html lang="en">
<head>
  <title>Document</title>
</head>
<script>
  let computerMove = '';
  let result = '';
  function pickComputerMove(){
    let randomNumber = Math.random();
   if (0 <= randomNumber <= 1/2)
    computerMove = 'Rock'
   else if(1/2 <= randomNumber <= 2/3)
    computerMove = 'Paper'
   else if (2/3 <= randomNumber <= 1)
    computerMove = 'Scissors'
  
   console.log(computerMove)
  }
 pickComputerMove();
</script>
<body>
  <button onclick="
    pickComputerMove();
    if (computerMove === 'Rock')
    result = 'Tie.'
   else if(computerMove === 'Paper')
   result = 'You lose.'
   else if(computerMove === 'Scissors')
   result = 'You win.'

   alert(`You picked Rock. Computer picked ${computerMove}. ${result}`)
    ">Rock</button>

  <button  onclick="
    pickComputerMove();
    if (computerMove === 'Rock')
    result = 'You win.'
   else if(computerMove === 'Paper')
   result = 'Tie.'
   else if(computerMove === 'Scissors')
   result = 'You lose.'

   alert(`You picked Paper. Computer picked ${computerMove}. ${result}`)
    ">Paper</button>

  <button  onclick="
    pickComputerMove();
    if (computerMove === 'Rock')
    result = 'You lose.'
   else if(computerMove === 'Paper')
   result = 'You win.'
   else if(computerMove === 'Scissors')
   result = 'Tie.'

   alert(`You picked Scissors. Computer picked ${computerMove}. ${result}`)
    ">Scissors</button>
</body>
</html>
