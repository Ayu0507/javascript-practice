<!-- Change text of paragraph when a button is clicked.  -->

<!DOCTYPE html>
<html lang="en">
<head>
  <title>Document</title>
</head>

<body>
  <p class="paragraph" 
  >This text is changed by clicking below button.</p>
  <button class="button" onclick="
  change();">Change</button>
</body>
<script>
  function change(){
let text = document.querySelector('.paragraph');
if(text.innerHTML === 'This text is changed by clicking below button.'){
  text.innerHTML = 'Changed successfully!'; 
}
else 
text.innerHTML = 'This text is changed by clicking below button.';
  }
</script>
</html>
